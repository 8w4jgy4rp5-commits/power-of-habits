<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>OGP Image</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #222;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Arial, sans-serif;
    }

    .og-card {
      width: 1200px;
      height: 630px;
      padding: 70px 80px;
      color: white;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.22), transparent 22%),
        radial-gradient(circle at 85% 80%, rgba(255, 255, 255, 0.18), transparent 25%),
        linear-gradient(135deg, #667eea 0%, #764ba2 45%, #2b5876 100%);
    }

    .badge {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.35);
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 0.04em;
      margin-bottom: 48px;
    }

    h1 {
      margin: 0;
      font-size: 88px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      text-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    .lead {
      margin-top: 28px;
      margin-bottom: 34px;
      max-width: 900px;
      font-size: 38px;
      line-height: 1.45;
      font-weight: bold;
    }

    .skills {
      display: flex;
      gap: 16px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .skills li {
      padding: 10px 18px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.22);
      font-size: 24px;
      font-weight: bold;
    }

    .footer {
      position: absolute;
      left: 80px;
      bottom: 50px;
      font-size: 24px;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <section class="og-card">
    <div class="badge">20 Hours Challenge</div>

    <h1>Power of Habits</h1>

    <p class="lead">
      20 journys of Learning to Build a Website from Scratch
    </p>

    <ul class="skills">
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
      <li>GitHub Pages</li>
    </ul>

    <div class="footer">
      power-of-habits
    </div>
  </section>
</body>
</html>
